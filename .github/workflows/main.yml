name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - '*.*.*'
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build-app:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: image-tag
        name: Docker tag (branch, tag, or PR head)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RAW="${{ github.head_ref }}"
          else
            RAW="${{ github.ref_name }}"
          fi
          # Docker tags: lowercase, no '/', only [a-z0-9._-], max length 128
          TAG=$(printf '%s' "$RAW" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | sed 's/[^a-z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-*//' | sed 's/-*$//' | cut -c1-128)
          if [ -z "$TAG" ]; then
            echo "Derived image tag is empty from ref '$RAW'" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using Docker image tag: $TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/axelpal/sellerstore-laravel-app:${{ steps.image-tag.outputs.tag }}
          file: ./docker/php/Dockerfile
#          platforms: "linux/amd64,linux/arm64/v8,linux/arm/v7"

  static-analysis:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pgsql, intl, zip
          coverage: none

      - name: Install Composer dependencies
        run: |
          cp .env.example .env
          composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Static analysis
        run: ./vendor/bin/phpstan analyse .

  build-nginx:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/axelpal/sellerstore-laravel-nginx:${{ needs.build-app.outputs.image_tag }}
          file: ./docker/nginx/Dockerfile
          build-args: |
            APP_IMAGE=ghcr.io/axelpal/sellerstore-laravel-app:${{ needs.build-app.outputs.image_tag }}
#          platforms: "linux/amd64,linux/arm64/v8,linux/arm/v7"
