services:
  app:
    image: ghcr.io/axelpal/sellerstore-laravel-app:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    tty: true
    entrypoint: /wait-for pgsql:5432 -t 60 -- /app-entrypoint.sh
    command: php-fpm -R -F
    env_file: .env
    networks:
      app_net:
    volumes:
      - .:/app:delegated
      - ./docker/php/app-entrypoint.sh:/app-entrypoint.sh
      - phpstan_data:/tmp/phpstan:delegated

  nginx:
    image: ghcr.io/axelpal/sellerstore-laravel-nginx:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
      args:
        APP_IMAGE: ghcr.io/axelpal/sellerstore-laravel-app:${IMAGE_TAG:-local}
    tty: true
    ports:
      - ${NGINX_PORT}:80
      - ${NGINX_SECURE_PORT}:80
    networks:
      app_net:

    volumes:
      - ./public:/app/public:delegated
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/includes:/etc/nginx/includes
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
  redis:
    image: redis
    tty: true
    profiles:
      - db
    volumes:
      - redis_data:/data:delegated
    networks:
      app_net:
  pgsql:
    image: postgres:16-alpine
    tty: true
    profiles:
      - db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: sellerstore
      POSTGRES_HOST_AUTH_METHOD: trust
    networks:
      app_net:
    volumes:
      - pgsql_data:/var/lib/postgresql/data:delegated

volumes:
  pgsql_data:
  redis_data:
  phpstan_data:

networks:
  app_net:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
